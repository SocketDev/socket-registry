name: 'Checkout'
description: 'Checkout repository with sensible defaults (fetch-depth 100, persist-credentials false)'

inputs:
  fetch-depth:
    description: 'Number of commits to fetch (0 = full history)'
    required: false
    default: '100'
  ref:
    description: 'Git ref to checkout'
    required: false
    default: ''
  working-directory:
    description: 'Subdirectory to check out into'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Clear git extraheader config
      shell: bash
      run: |
        # Clear any extraheader config that may cause duplicate Authorization headers.
        git config --global --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref }}
        path: ${{ inputs.working-directory != '.' && inputs.working-directory || '' }}
        fetch-depth: ${{ inputs.fetch-depth }}
        persist-credentials: false

    - name: Install zizmor
      # Auto-skip in matrix cells: zizmor has its own per-platform
      # binary support matrix (darwin-arm64, linux-x64, …), and its
      # `.github` audit is Node-version-indifferent — running it in
      # every (Node 22/24 × ubuntu/macos/windows) cell wastes runner
      # minutes and breaks on unsupported cells. `strategy.job-total`
      # is empty for non-matrix jobs and `1` for 1×1 matrices, so
      # `< 2` keeps scan-style jobs running zizmor while matrix test
      # cells silently skip. No user-facing input — preventing PR
      # authors from disabling scans via workflow inputs.
      if: strategy.job-total < 2
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Single source of truth: external-tools.json at the repo root of this action's checkout.
        # Previously duplicated the version + per-platform SHAs inline; a bump had to land in
        # both places. Now reads from the same file setup/action.yml uses for pnpm.
        TOOLS_FILE="${GITHUB_ACTION_PATH}/../../../external-tools.json"
        ZIZMOR_VERSION="$(jq -r .zizmor.version "$TOOLS_FILE")"
        ZIZMOR_DIR="${RUNNER_TEMP:-/tmp}/zizmor-bin"
        KERNEL="$(uname -s | cut -d- -f1)"
        ARCH="$(uname -m)"
        case "${KERNEL}-${ARCH}" in
          Linux-x86_64)                      PLATFORM="linux-x64"    ;;
          Linux-aarch64)                     PLATFORM="linux-arm64"  ;;
          Darwin-x86_64)                     PLATFORM="darwin-x64"   ;;
          Darwin-arm64)                      PLATFORM="darwin-arm64" ;;
          MINGW64_NT-x86_64|MSYS_NT-x86_64) PLATFORM="win-x64"       ;;
          *) echo "Unsupported platform: ${KERNEL}-${ARCH}" >&2; exit 1 ;;
        esac
        ASSET="$(jq -r ".zizmor.checksums[\"$PLATFORM\"].asset" "$TOOLS_FILE")"
        EXPECTED_SHA256="$(jq -r ".zizmor.checksums[\"$PLATFORM\"].sha256" "$TOOLS_FILE")"
        ZIZMOR_BIN="$ZIZMOR_DIR/zizmor"
        [[ "$ASSET" == *.zip ]] && ZIZMOR_BIN="$ZIZMOR_DIR/zizmor.exe"
        if [ ! -x "$ZIZMOR_BIN" ]; then
          mkdir -p "$ZIZMOR_DIR"
          DOWNLOAD_URL="https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/${ASSET}"
          DOWNLOAD_FILE="${ZIZMOR_DIR}/${ASSET}"
          curl -fsSL -o "$DOWNLOAD_FILE" "$DOWNLOAD_URL"
          ACTUAL_SHA256="$( (sha256sum "$DOWNLOAD_FILE" 2>/dev/null || shasum -a 256 "$DOWNLOAD_FILE") | cut -d' ' -f1 | tr -d '\\')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "Checksum mismatch for ${ASSET}!" >&2
            echo "  Expected: ${EXPECTED_SHA256}" >&2
            echo "  Actual:   ${ACTUAL_SHA256}" >&2
            exit 1
          fi
          if [[ "$ASSET" == *.zip ]]; then
            unzip -qo "$DOWNLOAD_FILE" -d "$ZIZMOR_DIR"
          else
            tar xzf "$DOWNLOAD_FILE" -C "$ZIZMOR_DIR"
          fi
          rm -f "$DOWNLOAD_FILE"
          chmod +x "$ZIZMOR_BIN"
        fi
        echo "$ZIZMOR_DIR" >> "${GITHUB_PATH:-/dev/null}"
        # Export canonical zizmor provenance in the shared SOCKET_TOOL_*
        # namespace so consumer jobs and Docker builds can reference a
        # single SOT without re-parsing external-tools.json.
        {
          echo "SOCKET_TOOL_ZIZMOR_VERSION=$ZIZMOR_VERSION"
          echo "SOCKET_TOOL_ZIZMOR_PLATFORM=$PLATFORM"
          echo "SOCKET_TOOL_ZIZMOR_ASSET=$ASSET"
          echo "SOCKET_TOOL_ZIZMOR_SHA256=$EXPECTED_SHA256"
          echo "SOCKET_TOOL_ZIZMOR_BIN=$ZIZMOR_BIN"
          echo "SOCKET_TOOL_ZIZMOR_DIR=$ZIZMOR_DIR"
        } >> "${GITHUB_ENV:-/dev/null}"

    - name: Audit GitHub Actions
      # Paired with "Install zizmor" above; see that step's comment
      # for the rationale behind the matrix-auto-skip.
      if: strategy.job-total < 2
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [ -d .github ]; then
          zizmor .github --gh-token "${GITHUB_TOKEN}" --min-severity medium
        fi

