name: 'Install'
description: 'Install pnpm dependencies and provision ecc-agentshield (sfw shims are set up by the setup action)'

inputs:
  frozen-lockfile:
    description: 'Pass --frozen-lockfile to pnpm install'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Bootstrap @socketsecurity/lib from npm registry
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ACTION_DIR: ${{ github.action_path }}
      run: |
        # Bootstrap @socketsecurity/lib into node_modules/ BEFORE
        # pnpm install runs. Several Socket repos have root scripts
        # (setup.mts, postinstall hooks) that import @socketsecurity/lib
        # at module-load time. On a fresh checkout, pnpm install
        # itself runs scripts that import the package — but pnpm
        # install hasn't completed yet, so the imports fail with
        # ERR_MODULE_NOT_FOUND. Pre-seeding from the npm registry
        # tarball solves the chicken-and-egg.
        #
        # Skipped silently when:
        #   - the repo has its own scripts/bootstrap-from-registry.mts
        #     (the preinstall hook handles it; no need to duplicate)
        #   - @socketsecurity/lib is already resolvable
        #   - the repo doesn't depend on @socketsecurity/lib at all
        #
        # Before downloading, the version is checked against the Socket
        # Firewall API (firewall-api.socket.dev/purl). Critical/high
        # severity alerts block the bootstrap; firewall errors are
        # non-fatal.
        if [ -f scripts/bootstrap-from-registry.mts ]; then
          echo "Repo has its own bootstrap-from-registry.mts; skipping action-level bootstrap."
          exit 0
        fi
        if node -e "require.resolve('@socketsecurity/lib/package.json')" 2>/dev/null; then
          echo "@socketsecurity/lib already resolvable; skipping bootstrap."
          exit 0
        fi
        VERSION="$(node "$ACTION_DIR/read-pinned-version.mts" '@socketsecurity/lib')"
        if [ -z "$VERSION" ]; then
          echo "@socketsecurity/lib not pinned in this repo; skipping bootstrap."
          exit 0
        fi
        # Firewall check — bail loudly on critical/high alerts.
        if ! node "$ACTION_DIR/check-firewall.mts" '@socketsecurity/lib' "$VERSION"; then
          exit 1
        fi
        echo "Bootstrapping @socketsecurity/lib@${VERSION} from npm registry..."
        TARBALL_URL="https://registry.npmjs.org/@socketsecurity/lib/-/lib-${VERSION}.tgz"
        TARBALL="$(mktemp -t socket-lib-XXXXXX.tgz)"
        if ! curl -fsSL "$TARBALL_URL" -o "$TARBALL"; then
          echo "Warning: failed to fetch ${TARBALL_URL}; pnpm install will resolve it." >&2
          rm -f "$TARBALL"
          exit 0
        fi
        DEST="node_modules/@socketsecurity/lib"
        rm -rf "$DEST"
        mkdir -p "$DEST"
        tar -xzf "$TARBALL" --strip-components=1 -C "$DEST"
        rm -f "$TARBALL"
        echo "✓ @socketsecurity/lib@${VERSION} → ${DEST}"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -z "$SFW_BIN" ] || [ ! -x "$SFW_BIN" ]; then
          echo "Error: sfw is not installed — run SocketDev/socket-registry/.github/actions/setup first" >&2
          exit 1
        fi
        pnpm install --loglevel error ${{ inputs.frozen-lockfile == 'true' && '--frozen-lockfile' || '' }}

    - name: Verify @socketsecurity/lib resolvable and >= floor version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # @socketsecurity/lib is required for downloadPackage (used below
        # to provision ecc-agentshield) and for several downstream build
        # scripts across the Socket fleet. We resolve it via Node's own
        # resolver rather than a file check, so the guard fires the same
        # way we'd actually fail at runtime.
        #
        # Floor version: the latest @socketsecurity/lib published to npm,
        # queried at action runtime so the floor tracks reality without
        # manual bumps in this action. If the npm query fails (offline,
        # rate-limited, registry down), fall back to HARDCODED_FLOOR —
        # the lowest version known to contain the un-stubbed pacote
        # fetchers required by downloadPackage (commit 320c757, shipped
        # in 5.24.0). Older versions throw "this pacote fetcher is
        # stubbed out" at runtime.
        HARDCODED_FLOOR="5.24.0"
        ACTUAL_VERSION="$(node -e "
          try {
            process.stdout.write(require('@socketsecurity/lib/package.json').version);
          } catch {
            process.stdout.write('');
          }
        ")"
        if [ -z "$ACTUAL_VERSION" ]; then
          CWD="$(pwd)"
          cat >&2 <<EOF
        × @socketsecurity/lib not resolvable from ${CWD}.
          The socket-registry install action requires it at runtime for
          downloadPackage (used to provision ecc-agentshield and related
          tools). Expected Node's module resolver to find the package
          after \`pnpm install\` completed, but
          \`require('@socketsecurity/lib/package.json')\` failed.
          Fix: add "@socketsecurity/lib" as a pinned exact version (e.g.
          "${HARDCODED_FLOOR}", not "^${HARDCODED_FLOOR}" or "*") to your
          package.json — prefer referencing a pnpm-workspace.yaml catalog
          entry so every workspace package shares the same pin. Commit
          the updated pnpm-lock.yaml, then push and re-run the workflow.
        EOF
          exit 1
        fi
        # Latest published version is the ideal floor. Bound the npm
        # query to 10s so a slow registry doesn't stall the job.
        # Validate the response matches plain semver via lib/semver.mjs
        # — Socket Firewall and other npm proxies sometimes intercept
        # queries and return a banner string, which would otherwise
        # poison the comparison below.
        SEMVER="${GITHUB_ACTION_PATH}/../lib/semver.mjs"
        NPM_LATEST="$(timeout 10 npm view @socketsecurity/lib version 2>/dev/null || true)"
        if [ -n "$NPM_LATEST" ] && node "$SEMVER" valid "$NPM_LATEST"; then
          MIN_VERSION="$NPM_LATEST"
          MIN_SOURCE="latest published on npm"
        else
          MIN_VERSION="$HARDCODED_FLOOR"
          if [ -n "$NPM_LATEST" ]; then
            MIN_SOURCE="hardcoded floor (npm view returned non-semver: ${NPM_LATEST:0:80})"
          else
            MIN_SOURCE="hardcoded floor (npm query failed)"
          fi
        fi
        # Defensive: ACTUAL_VERSION should always be plain semver since
        # it comes from package.json, but validate so a malformed pin
        # produces a clear error rather than a cryptic bash failure.
        if ! node "$SEMVER" valid "$ACTUAL_VERSION"; then
          echo "× @socketsecurity/lib package.json reports non-semver version: ${ACTUAL_VERSION:0:200}" >&2
          echo "  Expected MAJOR.MINOR.PATCH. Check the installed package's package.json." >&2
          exit 1
        fi
        if node "$SEMVER" lt "$ACTUAL_VERSION" "$MIN_VERSION"; then
          cat >&2 <<EOF
        × @socketsecurity/lib ${ACTUAL_VERSION} is below the required
          floor ${MIN_VERSION} (${MIN_SOURCE}).
          The socket-registry install action requires
          @socketsecurity/lib >= ${MIN_VERSION}; older versions either
          ship a stubbed pacote fetcher (< ${HARDCODED_FLOOR}) or are
          missing fixes consumed by downloadPackage and related fleet
          tooling.
          Fix: bump "@socketsecurity/lib" in package.json (or the
          pnpm-workspace.yaml catalog entry) to "${MIN_VERSION}" — pin
          exact, not "^" or "~". Run \`pnpm install\`, commit
          pnpm-lock.yaml, then push and re-run the workflow.
        EOF
          exit 1
        fi
        echo "@socketsecurity/lib ${ACTUAL_VERSION} >= ${MIN_VERSION} (${MIN_SOURCE})"

    - name: Install ecc-agentshield
      # Auto-skip in matrix cells: AgentShield's scan is
      # Node-version-indifferent and belongs in a single scan job
      # (the check / lint / type-check jobs in the reusable ci.yml),
      # not replicated across every Node × OS matrix cell.
      # `strategy.job-total` is empty for non-matrix jobs and `1` for
      # 1×1 matrices, so `< 2` keeps scan-style jobs installing
      # AgentShield while matrix test cells silently skip. No user-
      # facing input — preventing PR authors from disabling the scan
      # via workflow inputs.
      if: strategy.job-total < 2
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: | # zizmor: ignore[github-env]
        # Version resolution precedence (highest to lowest):
        #   1. package.json dependencies["ecc-agentshield"]      (literal, not "catalog:")
        #   2. package.json devDependencies["ecc-agentshield"]   (literal, not "catalog:")
        #   3. pnpm-workspace.yaml catalog ecc-agentshield
        #   4. Hardcoded fallback "1.4.0"
        #
        # Install goes through @socketsecurity/lib's downloadPackage
        # (the same helper the setup-security-tools Claude hook uses),
        # which caches into ~/.socket/_dlx/<hash>/. Every consumer that
        # uses this action gets agentshield provisioned regardless of
        # whether they declare a dep on it — the fallback ensures that.
        FALLBACK_VERSION="1.4.0"
        # JSON path reader shared with setup/checkout actions. Node
        # is universally preinstalled where jq is not.
        JQ="${GITHUB_ACTION_PATH}/../lib/jq.mjs"
        resolve_version() {
          if [ -f package.json ]; then
            local v
            v="$(node "$JQ" package.json dependencies ecc-agentshield 2>/dev/null || true)"
            if [ -n "$v" ] && [ "$v" != "catalog:" ]; then
              echo "$v"
              return
            fi
            v="$(node "$JQ" package.json devDependencies ecc-agentshield 2>/dev/null || true)"
            if [ -n "$v" ] && [ "$v" != "catalog:" ]; then
              echo "$v"
              return
            fi
          fi
          if [ -f pnpm-workspace.yaml ]; then
            local v
            v="$(grep -E '^[[:space:]]*ecc-agentshield:[[:space:]]*' pnpm-workspace.yaml \
                 | sed -E 's/^[[:space:]]*ecc-agentshield:[[:space:]]*//' \
                 | sed -E 's/[[:space:]]*#.*$//' \
                 | head -n1 \
                 | tr -d "\"'")"
            if [ -n "$v" ]; then
              echo "$v"
              return
            fi
          fi
          echo "$FALLBACK_VERSION"
        }
        AGENTSHIELD_VERSION="$(resolve_version)"
        echo "ecc-agentshield version: $AGENTSHIELD_VERSION"

        # Strip leading range/comparison chars — downloadPackage wants an
        # exact version. Discouraged forms like "^1.4.0" or "~1.4.0"
        # still work here but we prefer exact pins.
        CLEAN_VERSION="${AGENTSHIELD_VERSION#[\^~>=<]}"
        CLEAN_VERSION="${CLEAN_VERSION#=}"

        # Invoke downloadPackage via Node. Node sees the consumer repo's
        # node_modules (already installed above), so the dynamic import
        # of @socketsecurity/lib/dlx/package resolves the workspace copy.
        RESULT_JSON="$(AGENTSHIELD_SPEC="ecc-agentshield@${CLEAN_VERSION}" \
          node --input-type=module -e "
            import { downloadPackage } from '@socketsecurity/lib/dlx/package';
            const { binaryPath, installed } = await downloadPackage({
              package: process.env.AGENTSHIELD_SPEC,
              binaryName: 'agentshield',
            });
            process.stdout.write(JSON.stringify({ binaryPath, installed }));
          ")"
        BIN="$(echo "$RESULT_JSON" | node "$JQ" - binaryPath 2>/dev/null || true)"
        if [ -z "$BIN" ] || [ ! -x "$BIN" ]; then
          echo "× ecc-agentshield install failed — downloadPackage did not return an executable binary path" >&2
          echo "  Got: $RESULT_JSON" >&2
          exit 1
        fi
        {
          echo "SOCKET_TOOL_AGENTSHIELD_VERSION=$CLEAN_VERSION"
          echo "SOCKET_TOOL_AGENTSHIELD_BIN=$BIN"
        } >> "${GITHUB_ENV:-/dev/null}"
        echo "AgentShield ready: $BIN (v$CLEAN_VERSION)"
