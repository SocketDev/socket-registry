name: 'Install'
description: 'Install dependencies with sfw-free'

inputs:
  frozen-lockfile:
    description: 'Pass --frozen-lockfile to pnpm install'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup sfw-free wrappers
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Download sfw-free binary if not already present.
        SFW_DIR="${RUNNER_TEMP:-/tmp}/sfw-bin"
        SFW_BIN="$SFW_DIR/sfw"
        WRAPPER_DIR="${RUNNER_TEMP:-/tmp}/sfw-wrapper"
        if [ ! -x "$SFW_BIN" ]; then
          mkdir -p "$SFW_DIR"
          PLATFORM="$(uname -s)-$(uname -m)"
          case "$PLATFORM" in
            Linux-x86_64)  ASSET="sfw-free-linux-x86_64" ;;
            Linux-aarch64) ASSET="sfw-free-linux-arm64" ;;
            Darwin-x86_64) ASSET="sfw-free-macos-x86_64" ;;
            Darwin-arm64)  ASSET="sfw-free-macos-arm64" ;;
            *) echo "Unsupported platform: $PLATFORM" >&2; exit 1 ;;
          esac
          DOWNLOAD_URL="$(curl -fsSL \
            -H 'Accept: application/vnd.github+json' \
            https://api.github.com/repos/SocketDev/sfw-free/releases/latest \
            | jq -r --arg name "$ASSET" '.assets[] | select(.name == $name) | .browser_download_url')"
          curl -fsSL -o "$SFW_BIN" "$DOWNLOAD_URL"
          chmod +x "$SFW_BIN"
        fi
        # Write shell wrappers so all subsequent steps route through sfw.
        # Equivalent to: alias pnpm='sfw pnpm', alias cargo='sfw cargo', etc.
        if [ ! -d "$WRAPPER_DIR" ]; then
          mkdir -p "$WRAPPER_DIR"
          for name in cargo npm pip pnpm uv yarn; do
            printf '#!/bin/sh\nexec "%s" %s "$@"\n' "$SFW_BIN" "$name" > "$WRAPPER_DIR/$name"
            chmod +x "$WRAPPER_DIR/$name"
          done
        fi
        echo "$WRAPPER_DIR" >> "${GITHUB_PATH:-/dev/null}"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SFW_SILENT: 'true'
      run: pnpm install --loglevel error --prefer-offline ${{ inputs.frozen-lockfile == 'true' && '--frozen-lockfile' || '' }}
