name: 'Install'
description: 'Install dependencies with Socket CLI'

inputs:
  frozen-lockfile:
    description: 'Pass --frozen-lockfile to pnpm install'
    required: false
    default: 'false'
  silent:
    description: 'Pass --silent to sfw to suppress per-package firewall output'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup sfw pnpm shim
      shell: bash
      env:
        SFW_SHIM_SILENT: ${{ inputs.silent }}
      run: node "${{ github.action_path }}/setup-sfw.mjs"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install ${{ inputs.frozen-lockfile == 'true' && '--frozen-lockfile' || '' }}
