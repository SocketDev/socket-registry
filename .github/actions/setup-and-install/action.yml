name: 'Setup and Install'
description: 'Checkout code, setup environment, and install dependencies'

# Dependencies:
#   - actions/checkout@v6.0.2
#   - SocketDev/socket-registry/.github/actions/setup
#     - SocketDev/socket-registry/.github/actions/debug
#     - pnpm/action-setup@v5.0.0
#     - actions/setup-node@v5.0.0
#   - SocketDev/socket-registry/.github/actions/install

inputs:
  checkout:
    description: 'Whether to checkout code'
    required: false
    default: 'true'
  checkout-ref:
    description: 'Git ref to checkout'
    required: false
    default: ''
  debug:
    description: 'Enable debug output'
    required: false
    default: '0'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.21.0'
  scope:
    description: 'npm registry scope for package authentication'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Clear git extraheader config
      if: inputs.checkout == 'true'
      shell: bash
      run: |
        # Clear any extraheader config that may cause duplicate Authorization headers
        git config --global --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true

    - name: Checkout code
      if: inputs.checkout == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.checkout-ref }}
        path: ${{ inputs.working-directory != '.' && inputs.working-directory || '' }}
        fetch-depth: 100
        persist-credentials: false

    - name: Setup environment
      uses: SocketDev/socket-registry/.github/actions/setup@e2289f7caae8f9cbfa1778984066449347bcd5f1 # main
      with:
        debug: ${{ inputs.debug }}
        node-version: ${{ inputs.node-version }}
        pnpm-version: ${{ inputs.pnpm-version }}
        scope: ${{ inputs.scope }}
        registry-url: ${{ inputs.registry-url }}
        working-directory: ${{ inputs.working-directory }}

    - name: Install dependencies
      uses: SocketDev/socket-registry/.github/actions/install@24323cbd9e61a7e3a600b8c7e99eb27a29642a54 # main
      with:
        working-directory: ${{ inputs.working-directory }}
