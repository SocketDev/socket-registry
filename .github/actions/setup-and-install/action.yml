name: 'Setup and Install'
description: 'Aggregate: checkout + setup environment + install dependencies'

# Dependencies:
#   - SocketDev/socket-registry/.github/actions/checkout
#   - SocketDev/socket-registry/.github/actions/setup
#     - SocketDev/socket-registry/.github/actions/debug
#     - actions/setup-node@v6.2.0
#   - SocketDev/socket-registry/.github/actions/install

inputs:
  checkout:
    description: 'Whether to checkout code'
    required: false
    default: 'true'
  checkout-fetch-depth:
    description: 'Number of commits to fetch (0 = full history)'
    required: false
    default: '100'
  checkout-ref:
    description: 'Git ref to checkout'
    required: false
    default: ''
  debug:
    description: 'Enable debug output'
    required: false
    default: '0'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '25.9.0'
  scope:
    description: 'npm registry scope for package authentication'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  socket-api-key:
    description: 'Socket API key — when provided, uses sfw-enterprise instead of sfw-free'
    required: false
    default: ''
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: SocketDev/socket-registry/.github/actions/checkout@590b120728622bb76547966e870de69f13c1d634 # main
      with:
        fetch-depth: ${{ inputs.checkout-fetch-depth }}
        ref: ${{ inputs.checkout-ref }}
        working-directory: ${{ inputs.working-directory }}

    - name: Setup environment
      uses: SocketDev/socket-registry/.github/actions/setup@590b120728622bb76547966e870de69f13c1d634 # main
      with:
        debug: ${{ inputs.debug }}
        node-version: ${{ inputs.node-version }}
        scope: ${{ inputs.scope }}
        registry-url: ${{ inputs.registry-url }}
        socket-api-key: ${{ inputs.socket-api-key }}
        working-directory: ${{ inputs.working-directory }}

    - name: Install dependencies
      uses: SocketDev/socket-registry/.github/actions/install@590b120728622bb76547966e870de69f13c1d634 # main
      with:
        working-directory: ${{ inputs.working-directory }}
