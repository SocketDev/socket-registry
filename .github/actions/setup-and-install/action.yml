name: 'Setup and Install'
description: 'Aggregate: checkout + setup environment + install dependencies'

# Dependencies:
#   - SocketDev/socket-registry/.github/actions/checkout
#   - SocketDev/socket-registry/.github/actions/setup
#     - SocketDev/socket-registry/.github/actions/debug
#     - pnpm/action-setup@v5.0.0
#     - actions/setup-node@v6.2.0
#   - SocketDev/socket-registry/.github/actions/install

inputs:
  checkout:
    description: 'Whether to checkout code'
    required: false
    default: 'true'
  checkout-fetch-depth:
    description: 'Number of commits to fetch (0 = full history)'
    required: false
    default: '100'
  checkout-ref:
    description: 'Git ref to checkout'
    required: false
    default: ''
  debug:
    description: 'Enable debug output'
    required: false
    default: '0'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.21.0'
  scope:
    description: 'npm registry scope for package authentication'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: SocketDev/socket-registry/.github/actions/checkout@9188d3a5cb2036b1ecd194cdf8d19f384e4ac05e # main
      with:
        fetch-depth: ${{ inputs.checkout-fetch-depth }}
        ref: ${{ inputs.checkout-ref }}
        working-directory: ${{ inputs.working-directory }}

    - name: Setup environment
      uses: SocketDev/socket-registry/.github/actions/setup@9188d3a5cb2036b1ecd194cdf8d19f384e4ac05e # main
      with:
        debug: ${{ inputs.debug }}
        node-version: ${{ inputs.node-version }}
        pnpm-version: ${{ inputs.pnpm-version }}
        scope: ${{ inputs.scope }}
        registry-url: ${{ inputs.registry-url }}
        working-directory: ${{ inputs.working-directory }}

    - name: Install dependencies
      uses: SocketDev/socket-registry/.github/actions/install@9188d3a5cb2036b1ecd194cdf8d19f384e4ac05e # main
      with:
        working-directory: ${{ inputs.working-directory }}
