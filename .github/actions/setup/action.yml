name: 'Setup'
description: 'Setup debug, Node.js, pnpm, and Socket firewall shims'

# Dependencies:
#   - actions/setup-node@v6.2.0
#   - SocketDev/socket-registry/.github/actions/debug

inputs:
  debug:
    description: 'Enable debug output'
    required: false
    default: '0'
  node-version:
    description: 'Node.js version'
    required: false
    default: '25.9.0'
  scope:
    description: 'npm registry scope for package authentication'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  socket-api-key:
    description: 'Socket API key — when provided, uses sfw-enterprise instead of sfw-free'
    required: false
    default: ''
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup debug
      uses: SocketDev/socket-registry/.github/actions/debug@925fe52ef35fbfc00415ee3e75629be007e8a7c9 # main
      with:
        debug: ${{ inputs.debug }}

    - name: Install pnpm
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Single source of truth: external-tools.json at the repo root of this action's checkout.
        TOOLS_FILE="${GITHUB_ACTION_PATH}/../../../external-tools.json"
        PNPM_VERSION="$(jq -r .pnpm.version "$TOOLS_FILE")"
        PNPM_DIR="${RUNNER_TEMP:-/tmp}/pnpm-bin"
        KERNEL="$(uname -s | cut -d- -f1)"
        ARCH="$(uname -m)"
        case "${KERNEL}-${ARCH}" in
          Linux-x86_64)                      PLATFORM="linux-x64"    ;;
          Linux-aarch64)                     PLATFORM="linux-arm64"  ;;
          Darwin-x86_64)                     PLATFORM="darwin-x64"   ;;
          Darwin-arm64)                      PLATFORM="darwin-arm64" ;;
          MINGW64_NT-x86_64|MSYS_NT-x86_64) PLATFORM="win-x64"       ;;
          *) echo "Unsupported platform: ${KERNEL}-${ARCH}" >&2; exit 1 ;;
        esac
        ASSET="$(jq -r ".pnpm.checksums[\"$PLATFORM\"].asset" "$TOOLS_FILE")"
        EXPECTED_SHA256="$(jq -r ".pnpm.checksums[\"$PLATFORM\"].sha256" "$TOOLS_FILE")"
        PNPM_BIN="$PNPM_DIR/pnpm"
        [[ "$ASSET" == *.zip ]] && PNPM_BIN="$PNPM_DIR/pnpm.exe"
        if [ ! -x "$PNPM_BIN" ]; then
          mkdir -p "$PNPM_DIR"
          ARCHIVE_PATH="$PNPM_DIR/$ASSET"
          curl -fsSL -o "$ARCHIVE_PATH" "https://github.com/pnpm/pnpm/releases/download/v${PNPM_VERSION}/${ASSET}"
          ACTUAL_SHA256="$( (sha256sum "$ARCHIVE_PATH" 2>/dev/null || shasum -a 256 "$ARCHIVE_PATH") | cut -d' ' -f1 | tr -d '\\')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "Checksum mismatch for ${ASSET}!" >&2
            echo "  Expected: ${EXPECTED_SHA256}" >&2
            echo "  Actual:   ${ACTUAL_SHA256}" >&2
            rm -f "$ARCHIVE_PATH"
            exit 1
          fi
          # v11 ships as tarballs/zips containing pnpm binary + dist/ directory.
          if [[ "$ASSET" == *.zip ]]; then
            powershell -NoProfile -Command "Expand-Archive -Path '$ARCHIVE_PATH' -DestinationPath '$PNPM_DIR' -Force"
          else
            tar xzf "$ARCHIVE_PATH" -C "$PNPM_DIR"
          fi
          rm -f "$ARCHIVE_PATH"
          chmod +x "$PNPM_BIN"
        fi
        echo "$PNPM_DIR" >> "${GITHUB_PATH:-/dev/null}"

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}

    - name: Download sfw
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SOCKET_API_KEY: ${{ inputs.socket-api-key }}
      run: | # zizmor: ignore[github-env]
        # Pinned version + per-platform checksum pairs. Bumping a tool
        # requires updating the matching version AND every platform's
        # SHA256 in the same commit, otherwise the download / verify
        # steps will diverge.
        SFW_FREE_VERSION="1.7.2"
        SFW_ENTERPRISE_VERSION="1.7.2"
        SFW_DIR="${RUNNER_TEMP:-/tmp}/sfw-bin"
        KERNEL="$(uname -s | cut -d- -f1)"
        ARCH="$(uname -m)"
        USE_ENTERPRISE=false
        if [ -n "$SOCKET_API_KEY" ]; then
          USE_ENTERPRISE=true
        fi
        if $USE_ENTERPRISE; then
          REPO="SocketDev/firewall-release"
          SFW_VERSION="$SFW_ENTERPRISE_VERSION"
          case "${KERNEL}-${ARCH}" in
            Linux-x86_64)                      ASSET="sfw-linux-x86_64"       ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="4482b52e6367bd4610519bfd57a104d5907ec87d5399142ed3bb3d222de1f33d" ;;
            Linux-aarch64)                     ASSET="sfw-linux-arm64"         ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="c24a79c27e1a01a59b7a160c165930ae029816c72b141fcfcdb2f73e0774898a" ;;
            Darwin-x86_64)                     ASSET="sfw-macos-x86_64"       ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="da252d2a9a5d0edb271bb771e0d01b9cd6fa1635b6d765f61efd61edb6739f12" ;;
            Darwin-arm64)                      ASSET="sfw-macos-arm64"        ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="b1cdc3bdbd2a3161247bd5cc215eb3c44a90b87fe0b800a33889a14f61bb0d6d" ;;
            MINGW64_NT-x86_64|MSYS_NT-x86_64) ASSET="sfw-windows-x86_64.exe" ; SFW_BIN="$SFW_DIR/sfw.exe" ; EXPECTED_SHA256="e52ad806a1c41b440f04098eb1c7e407845f03f5740a6a79006ba6fd172056ec" ;;
            *) echo "Unsupported platform: ${KERNEL}-${ARCH}" >&2; exit 1 ;;
          esac
        else
          REPO="SocketDev/sfw-free"
          SFW_VERSION="$SFW_FREE_VERSION"
          case "${KERNEL}-${ARCH}" in
            Linux-x86_64)                      ASSET="sfw-free-linux-x86_64"       ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="93e2d9dfa244b82a74e014dc26b1c6af18b4adec20f35254378943db5fe91411" ;;
            Linux-aarch64)                     ASSET="sfw-free-linux-arm64"         ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="84a045e4e1bb320cc5c0d3929f02e53f199398b5be0637e8846d02d9ef0027b1" ;;
            Darwin-x86_64)                     ASSET="sfw-free-macos-x86_64"       ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="a5427d479d440f08e3789fa191ba57599be64997196daf42e67d964fec0382b4" ;;
            Darwin-arm64)                      ASSET="sfw-free-macos-arm64"        ; SFW_BIN="$SFW_DIR/sfw"     ; EXPECTED_SHA256="248fb588e1e1a27e7192f7b079f739fc29a9de61f0bad7e90928363022dc5643" ;;
            MINGW64_NT-x86_64|MSYS_NT-x86_64) ASSET="sfw-free-windows-x86_64.exe" ; SFW_BIN="$SFW_DIR/sfw.exe" ; EXPECTED_SHA256="6d333b4cac9d7c5712e2e99677ca634ac8a3020d550c6308312c60bea97f0a28" ;;
            *) echo "Unsupported platform: ${KERNEL}-${ARCH}" >&2; exit 1 ;;
          esac
        fi
        if [ ! -x "$SFW_BIN" ]; then
          mkdir -p "$SFW_DIR"
          DOWNLOAD_URL="$(gh api "repos/${REPO}/releases/tags/v${SFW_VERSION}" \
            --jq ".assets[] | select(.name == \"$ASSET\") | .browser_download_url")"
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Asset ${ASSET} not found in ${REPO}@v${SFW_VERSION}" >&2
            exit 1
          fi
          curl -fsSL -o "$SFW_BIN" "$DOWNLOAD_URL"
          ACTUAL_SHA256="$( (sha256sum "$SFW_BIN" 2>/dev/null || shasum -a 256 "$SFW_BIN") | cut -d' ' -f1 | tr -d '\\')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "Checksum mismatch for ${ASSET} (${REPO}@v${SFW_VERSION})!" >&2
            echo "  Expected: ${EXPECTED_SHA256}" >&2
            echo "  Actual:   ${ACTUAL_SHA256}" >&2
            rm -f "$SFW_BIN"
            exit 1
          fi
          chmod +x "$SFW_BIN"
        fi
        echo "SFW_BIN=$SFW_BIN" >> "${GITHUB_ENV:-/dev/null}"
        echo "SFW_IS_ENTERPRISE=$USE_ENTERPRISE" >> "${GITHUB_ENV:-/dev/null}"
        if $USE_ENTERPRISE; then
          echo "SOCKET_API_KEY=$SOCKET_API_KEY" >> "${GITHUB_ENV:-/dev/null}"
        fi

    - name: Create sfw shims
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Shim supported package managers so their commands route through sfw.
        #
        # Wrapper mode ecosystems (sfw-free):
        #   JavaScript/TypeScript: npm, yarn, pnpm
        #   Python: pip, uv
        #   Rust: cargo
        # https://github.com/SocketDev/sfw-free?tab=readme-ov-file#supported-package-managers
        #
        # Additional wrapper mode ecosystems (sfw-enterprise):
        #   Ruby: gem, bundler
        #   .NET: nuget
        #   Go: go (Linux only)
        # https://github.com/SocketDev/firewall-release/wiki#support-matrix
        SHIM_DIR="${RUNNER_TEMP:-/tmp}/sfw-shim"
        rm -rf "$SHIM_DIR"
        mkdir -p "$SHIM_DIR"
        IS_WINDOWS=false
        [[ "$OSTYPE" == msys* || "$OSTYPE" == cygwin* ]] && IS_WINDOWS=true
        msys_to_win_path() {
          if $IS_WINDOWS && [[ "$1" =~ ^/([a-zA-Z])/(.*) ]]; then
            echo "${BASH_REMATCH[1]^^}:\\${BASH_REMATCH[2]//\//\\}"
          else
            echo "$1"
          fi
        }
        strip_shim_dir() { echo "$PATH" | tr ':' '\n' | grep -vxF "$SHIM_DIR" | paste -sd: -; }
        CLEAN_PATH="$(strip_shim_dir)"
        SSL_WORKAROUND=""
        SHIM_CMDS="npm yarn pnpm pip pip3 uv cargo"
        if [ "$SFW_IS_ENTERPRISE" = "true" ]; then
          SHIM_CMDS="npm yarn pnpm pip pip3 uv cargo gem bundler nuget"
          # Go wrapper mode is only supported on Linux.
          [[ "$OSTYPE" == linux* ]] && SHIM_CMDS="$SHIM_CMDS go"
        else
          SSL_WORKAROUND='export GIT_SSL_NO_VERIFY=true # Workaround: sfw-free does not yet set GIT_SSL_CAINFO.'
        fi
        for CMD in $SHIM_CMDS; do
          REAL="$(PATH="$CLEAN_PATH" command -v "$CMD" 2>/dev/null || true)"
          [ -z "$REAL" ] && continue
          REAL="$(msys_to_win_path "$REAL")"
          SHIM_LINES=('#!/bin/bash' "export PATH=\"\$(echo \"\$PATH\" | tr ':' '\n' | grep -vxF '${SHIM_DIR}' | paste -sd: -)\"")
          [ -n "$SSL_WORKAROUND" ] && SHIM_LINES+=("$SSL_WORKAROUND")
          SHIM_LINES+=("exec \"${SFW_BIN}\" \"${REAL}\" \"\$@\"")
          printf '%s\n' "${SHIM_LINES[@]}" > "$SHIM_DIR/$CMD"
          chmod +x "$SHIM_DIR/$CMD"
          if $IS_WINDOWS; then
            printf '@echo off\r\nset "PATH=;%%PATH%%;"\r\nset "PATH=%%PATH:;%s;=;%%"\r\nset "PATH=%%PATH:~1,-1%%"\r\n"%s" "%s" %%*\r\n' \
              "$SHIM_DIR" "$SFW_BIN" "$REAL" > "$SHIM_DIR/$CMD.cmd"
          fi
        done
        echo "$SHIM_DIR" >> "${GITHUB_PATH:-/dev/null}"
        echo "SFW_SHIM_DIR=$SHIM_DIR" >> "${GITHUB_ENV:-/dev/null}"

    - name: Export SFW_CUSTOM_REGISTRIES bypass list
      shell: bash
      run: | # zizmor: ignore[github-env]
        # Ship an up-to-date host bypass list to both sfw-free and
        # sfw-enterprise via SFW_CUSTOM_REGISTRIES, so consumers pick up
        # new hosts without waiting for a binary release.
        # Kinds accepted: npm, pypi, golang, maven, gem, cargo, nuget,
        # block, wrap, bypass.
        # Format: comma- or newline-separated kind:fqdn entries.
        # Source of truth (baked into the binary) lives at
        # SocketDev/firewall:src/lib/registries/default.ts.
        {
          echo 'SFW_CUSTOM_REGISTRIES<<EOF'
          # GitHub release-asset CDNs (targets of github.com/*/releases/download/*
          # and github.com/*/archive/* redirects).
          echo 'bypass:objects.githubusercontent.com'
          echo 'bypass:release-assets.githubusercontent.com'
          echo 'bypass:raw.githubusercontent.com'
          echo 'bypass:gist.githubusercontent.com'
          # VCS fallbacks (Go modules, npm git-deps, Ruby git sources).
          echo 'bypass:gitlab.com'
          echo 'bypass:bitbucket.org'
          # Build-tool toolchain downloads.
          echo 'bypass:ziglang.org'
          echo 'bypass:cmake.org'
          echo 'bypass:sh.rustup.rs'
          echo 'bypass:nodejs.org'
          echo 'bypass:bootstrap.pypa.io'
          # Cargo web portal (search/info API).
          echo 'bypass:crates.io'
          # Conda ecosystem.
          echo 'bypass:repo.anaconda.com'
          echo 'bypass:conda.anaconda.org'
          echo 'bypass:anaconda.org'
          echo 'bypass:conda-forge.org'
          # Composer (PHP).
          echo 'bypass:packagist.org'
          echo 'bypass:repo.packagist.org'
          # Conan (C/C++).
          echo 'bypass:center.conan.io'
          echo 'bypass:conan.io'
          # CocoaPods (Swift/Obj-C).
          echo 'bypass:cdn.cocoapods.org'
          # Hackage (Haskell).
          echo 'bypass:hackage.haskell.org'
          # Hex (Elixir/Erlang).
          echo 'bypass:hex.pm'
          echo 'bypass:repo.hex.pm'
          echo 'bypass:builds.hex.pm'
          # HuggingFace model hub.
          echo 'bypass:huggingface.co'
          # Julia.
          echo 'bypass:pkg.julialang.org'
          echo 'bypass:julialang-s3.julialang.org'
          # LuaRocks.
          echo 'bypass:luarocks.org'
          # OPAM + OCaml toolchain.
          echo 'bypass:opam.ocaml.org'
          echo 'bypass:ocaml.org'
          # pub.dev (Dart / Flutter).
          echo 'bypass:pub.dev'
          # CPAN (Perl).
          echo 'bypass:metacpan.org'
          echo 'bypass:cpan.metacpan.org'
          # CRAN (R).
          echo 'bypass:cran.r-project.org'
          echo 'bypass:cran.rstudio.com'
          echo 'bypass:bioconductor.org'
          # Bitnami.
          echo 'bypass:downloads.bitnami.com'
          # Swift toolchain + package index.
          echo 'bypass:swift.org'
          echo 'bypass:download.swift.org'
          echo 'bypass:swiftpackageindex.com'
          # VSCode extension marketplace.
          echo 'bypass:marketplace.visualstudio.com'
          # Bazel external workspace mirror.
          echo 'bypass:mirror.bazel.build'
          echo 'EOF'
        } >> "${GITHUB_ENV:-/dev/null}"
        # Opt out of gh CLI telemetry (on-by-default as of late 2025).
        # DO_NOT_TRACK covers tools honoring consoledonottrack.com;
        # GH_TELEMETRY is gh-specific and takes precedence.
        echo "DO_NOT_TRACK=1" >> "${GITHUB_ENV:-/dev/null}"
        echo "GH_TELEMETRY=0" >> "${GITHUB_ENV:-/dev/null}"
