name: 'Setup'
description: 'Setup debug, Node.js, and pnpm with caching'

# Dependencies:
#   - actions/setup-node@v6.2.0
#   - pnpm/action-setup@v5.0.0
#   - SocketDev/socket-registry/.github/actions/debug

inputs:
  debug:
    description: 'Enable debug output'
    required: false
    default: '0'
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10.21.0'
  scope:
    description: 'npm registry scope for package authentication'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup debug
      uses: SocketDev/socket-registry/.github/actions/debug@31b5c29ebf6668dc2e0fc8ec20c1f8845811fe5f # main
      with:
        debug: ${{ inputs.debug }}

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      # NOTE: Do not specify 'version' here - pnpm-action-setup automatically reads
      # the version from the 'packageManager' field in package.json. Specifying both
      # causes ERR_PNPM_BAD_PM_VERSION errors.
      # with:
      #   version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js with pnpm cache
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.working-directory != '.' && format('{0}/pnpm-lock.yaml', inputs.working-directory) || 'pnpm-lock.yaml' }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
