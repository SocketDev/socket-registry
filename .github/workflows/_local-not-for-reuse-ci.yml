name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@3d1623ff597bda1c781184c76232499e8100068f # main
    with:
      fail-fast: false
      lint-script: 'pnpm run lint --all'
      lint-setup-script: 'pnpm run build'
      node-versions: '[20, 22, 24]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
      test-script: 'pnpm run test --all --fast'
      test-setup-script: 'pnpm run build'
      type-check-script: 'pnpm run check'
      type-check-setup-script: 'pnpm run build'
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          autocrlf: false
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@3d1623ff597bda1c781184c76232499e8100068f # main
        with:
          node-version: 22
          socket-api-key: ${{ secrets.SOCKET_API_KEY }}

      - uses: SocketDev/socket-registry/.github/actions/cache-npm-packages@3d1623ff597bda1c781184c76232499e8100068f # main

      - name: Verify sfw is installed
        shell: bash
        run: |
          if [ -z "$SFW_BIN" ] || [ ! -x "$SFW_BIN" ]; then
            echo "Error: sfw is not installed — run SocketDev/socket-registry/.github/actions/setup first" >&2
            exit 1
          fi

      - name: Build registry
        shell: bash
        run: |
          pnpm run build

      - name: Run npm package tests
        shell: bash
        run: |
          node scripts/npm/test-npm-packages.mjs
