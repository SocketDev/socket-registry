name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@dea9b15a558831273aaa6c9ab94c4efb9f8b06ca # main (2026-05-15)
    with:
      test-script: 'pnpm run test --all --fast'
      node-versions: '["22", "24"]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # TEMPORARY: pin to the diagnostic SHA so the `ls -la` block
      # added in setup/action.yml + checkout/action.yml actually
      # runs (the previous SHA-pinned setup-and-install@56be73d6
      # doesn't have the diagnostic yet). Revert to a stable SHA
      # once external-tools.json path resolution is fixed.
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@92c6ffb792d8a4bdc59ba53a93dc69cf03ea7b9d # diagnostic (2026-05-18)
        with:
          node-version: 22

      - name: Build and test npm packages
        shell: bash
        run: |
          pnpm run build
          pnpm run test:npm
