name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@b86b2cb3fefa4ffa6c1a702476f9785f6c3bb887 # main
    with:
      fail-fast: false
      lint-script: 'pnpm run lint --all'
      lint-setup-script: 'pnpm run build'
      node-versions: '[20, 22, 24]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
      test-script: 'pnpm run test --all --fast'
      test-setup-script: 'pnpm run build'
      type-check-script: 'pnpm run check'
      type-check-setup-script: 'pnpm run build'
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@b86b2cb3fefa4ffa6c1a702476f9785f6c3bb887 # main
        with:
          node-version: 22

      - name: Build and test npm packages
        shell: bash
        run: |
          pnpm run build
          pnpm run test:npm
