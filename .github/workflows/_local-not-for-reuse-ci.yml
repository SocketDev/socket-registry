name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@b9918c72da5f4197c1af5cba60583efbeb64daf5 # main
    with:
      test-script: 'pnpm run test --all --fast'
      node-versions: '["22", "24"]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_TOKEN }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@b9918c72da5f4197c1af5cba60583efbeb64daf5 # main
        with:
          node-version: 22

      - name: Build and test npm packages
        shell: bash
        run: |
          pnpm run build
          pnpm run test:npm
