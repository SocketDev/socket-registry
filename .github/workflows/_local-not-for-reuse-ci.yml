name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@d83e76d998a5b13e7e844273898ccee35bb991c4 # main
    with:
      fail-fast: false
      lint-script: 'pnpm run lint --all'
      lint-setup-script: 'pnpm run build'
      node-versions: '[20, 22, 24]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
      test-script: 'pnpm run test --all --fast'
      test-setup-script: 'pnpm run build'
      type-check-script: 'pnpm run check'
      type-check-setup-script: 'pnpm run build'

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          autocrlf: false
          persist-credentials: false

      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@d83e76d998a5b13e7e844273898ccee35bb991c4 # main
        with:
          node-version: 22

      - uses: SocketDev/socket-registry/.github/actions/cache-npm-packages@d83e76d998a5b13e7e844273898ccee35bb991c4 # main

      - name: Build registry
        run: pnpm run build

      - name: Run npm package tests
        run: node scripts/npm/test-npm-packages.mjs
