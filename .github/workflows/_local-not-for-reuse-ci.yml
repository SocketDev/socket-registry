name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@f8100a9981bf5ca60b62b3a06a6a93a29067619b # main (2026-05-15)
    with:
      test-script: 'pnpm run test --all --fast'
      node-versions: '["22", "24"]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@f8100a9981bf5ca60b62b3a06a6a93a29067619b # main (2026-05-15)
        with:
          node-version: 22

      - name: Build and test npm packages
        shell: bash
        run: |
          pnpm run build
          pnpm run test:npm
