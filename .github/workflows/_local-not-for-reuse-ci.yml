# Layer 4 — `_local` wrapper. NOT reused externally; this is
# socket-registry's own CI entry point. References Layer 3 (ci.yml)
# AND inline Layer 1 (cache-npm-packages) + Layer 2b (setup-and-install)
# for the additional jobs it runs alongside the reusable workflow.
# Both ref kinds bump to the PROPAGATION SHA during cascade. See
# updating-workflows skill — Phase 5 (Layer 4) sweeps both ref shapes.

name: 🚀 CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@1c633fb12cf27b12f06f9d685e89d34e302822c3 # main (2026-06-13)
    with:
      test-script: 'pnpm run test --all --fast'
      node-versions: '["22", "24"]'
      os-versions: '["ubuntu-latest", "windows-latest"]'
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}

  test-npm-packages:
    name: Test NPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@b3f42a5f19c0a3854a67a8387c97ed0bb77caa00 # main (2026-06-09)
        with:
          node-version: 22

      - name: Build and test npm packages
        shell: bash
        run: |
          pnpm run build
          pnpm run test:npm
