# Layer 4 — `_local` wrapper. NOT reused externally; this is
# socket-registry's own publish entry point. References Layer 3
# (provenance.yml) which it pins to the PROPAGATION SHA on cascade.
# See updating-workflows skill at .claude/skills/updating-workflows/.

name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'
      force-registry:
        description: 'Force publish @socketsecurity/registry regardless of version changes'
        required: false
        default: false
        type: boolean
      skip-npm-packages:
        description: 'Skip publishing npm override packages (packages/*)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@c0a5f8942e040dafcd883ef7baec501fc4ea73be # main (2026-05-28)
    with:
      debug: ${{ inputs.debug }}
      force-registry: ${{ inputs.force-registry }}
      publish-script: 'package-npm-publish' # runs scripts/npm/publish-npm-packages.mts
      setup-script: 'pnpm run build'
      skip-npm-packages: ${{ inputs.skip-npm-packages }}
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
