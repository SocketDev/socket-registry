name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'
      force-registry:
        description: 'Force publish @socketsecurity/registry regardless of version changes'
        required: false
        default: false
        type: boolean
      publish-without-sfw:
        description: 'Publish directly to npm, bypassing Socket firewall shims'
        required: false
        default: false
        type: boolean
      skip-npm-packages:
        description: 'Skip publishing npm override packages (packages/*)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@3362af95fadd1e325cb48e9ad6daff21c112bd72 # main
    with:
      debug: ${{ inputs.debug }}
      force-registry: ${{ inputs.force-registry }}
      publish-script: 'package-npm-publish' # runs scripts/npm/publish-npm-packages.mts
      publish-without-sfw: ${{ inputs.publish-without-sfw }}
      setup-script: 'pnpm run build'
      skip-npm-packages: ${{ inputs.skip-npm-packages }}
      use-trusted-publishing: true
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}
