# Layer 4 — `_local` wrapper. NOT reused externally; this is
# socket-registry's own weekly-update entry point. References Layer 3
# (weekly-update.yml) which it pins to the PROPAGATION SHA on cascade.
# See updating-workflows skill at .claude/skills/updating-workflows/.

name: 🔄 Weekly Update

# Local (socket-registry) weekly-update workflow.
# Delegates to the shared reusable at
# SocketDev/socket-registry/.github/workflows/weekly-update.yml.

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-update:
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.yml@74f3353793b9a9619bef7badae29821260bd4225 # main (2026-05-28)
    with:
      test-setup-script: ''
      test-script: 'pnpm test'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
