# Layer 4 — `_local` wrapper. NOT reused externally; this is
# socket-registry's own weekly-update entry point. References Layer 3
# (weekly-update.yml, the thin delegator) which it pins to the PROPAGATION SHA
# on cascade — exercising the same delegator → gh-aw .lock.yml path consumers
# run. See updating-workflows skill at .claude/skills/repo/updating-workflows/.

name: 🔄 Weekly Update

# Local (socket-registry) weekly-update workflow.
# Delegates to the shared reusable at
# SocketDev/socket-registry/.github/workflows/weekly-update.yml, which in turn
# delegates to the gh-aw-compiled weekly-update.lock.yml.

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch:

# The gh-aw impl runs the agent, opens the PR via safe-outputs, and dispatches
# fix-test-failures. A reusable workflow's token cannot exceed the caller's, so
# grant the write union here — same scopes every consumer's thin caller grants.
permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  weekly-update:
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.yml@f686e4e3b7554d83a4597f1e60514ea70ce09ed8 # main (2026-07-10)
    with:
      test-setup-script: ''
      test-script: 'pnpm test'
    secrets:
      # gh-aw signs PR commits via GitHub web-flow, so BOT_GPG_PRIVATE_KEY
      # is no longer part of the reusable's secrets contract.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
