name: 🔗 Claude Auto Review

# Dependencies:
#   - actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
#   - anthropics/claude-code-action@v1.0.66
#     - oven-sh/setup-bun@v2.0.2
#   - SocketDev/socket-registry/.github/actions/debug

on:
  workflow_call:
    inputs:
      allowed_tools:
        description: 'Allowed tools for the review'
        required: false
        type: string
        default: 'mcp__github__create_pending_pull_request_review,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff'
      debug:
        description: 'Enable debug output (e.g., "0" or "1")'
        required: false
        type: string
        default: '0'
      direct_prompt:
        description: 'Prompt for the review'
        required: false
        type: string
        default: |
          Please review this pull request and provide actionable feedback.

          Focus on:
          - Code quality and best practices
          - Potential bugs or issues
          - Performance considerations
          - Security implications
          - Overall architecture and design decisions

          Provide constructive feedback with specific suggestions for improvement.
          Use inline comments to highlight specific areas of concern. Be concise and clear in your feedback.
      timeout_minutes:
        description: 'Timeout in minutes (e.g., "60" for code reviews, "120" for extensive reviews)'
        required: false
        type: string
        default: '60'
    secrets:
      anthropic_api_key:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-review:
    name: Run Auto Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          autocrlf: false
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.2.0
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup debug
        uses: SocketDev/socket-registry/.github/actions/debug@f694b7ecc21bc3eb9c9092881ed6e7ba5ba042cc # main
        with:
          debug: ${{ inputs.debug }}

      - name: Automatic PR Review
        uses: anthropics/claude-code-action@64c7a0ef71df67b14cb4471f4d9c8565c61042bf # v1.0.66
        with:
          allowed_tools: ${{ inputs.allowed_tools }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          direct_prompt: ${{ inputs.direct_prompt }}
          timeout_minutes: ${{ inputs.timeout_minutes }}
