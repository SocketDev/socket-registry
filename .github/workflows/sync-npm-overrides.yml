name: 🔁 sync npm overrides

# Weekly drift check for packages/npm/* overrides against their upstream
# latest (the npm-overrides-are-current law, network-backed), plus a manual
# apply mode that drives the AI sync — implementation and unit tests updated
# in lock-step per docs/agents.md/fleet/test-layout.md. Runs an hour after
# the Monday weekly-update so dependency noise settles first.

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Drive the AI sync for stale overrides (false = check only).'
        type: boolean
        default: false
      package:
        description: 'Limit to one override (Socket or upstream name); empty = all.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
      - uses: ./.github/actions/fleet/setup-and-install
      - name: Check override drift
        if: ${{ inputs.apply != true }}
        run: node scripts/npm/sync-npm-overrides.mts --check
      - name: Sync stale overrides (AI, lock-step impl + tests)
        if: ${{ inputs.apply == true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PACKAGE_FILTER: ${{ inputs.package }}
        run: node scripts/npm/sync-npm-overrides.mts --apply ${PACKAGE_FILTER:+--package "$PACKAGE_FILTER"}
