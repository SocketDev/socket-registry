# Layer 3 — reusable workflow (thin delegator). Consumers pin this stable
# entry point; it delegates to the gh-aw-compiled weekly-update.lock.yml, which
# runs the agentic update behind the gh-aw firewall + github-mcp-server and
# opens the PR via safe-outputs. The .lock.yml is gh-aw-owned (regenerated by
# `gh aw compile` from weekly-update.md) — never hand-edited, and excluded from
# the SHA-pin cascade (scripts/cascade-workflows.mts skips gh-aw files). When
# this file or the .lock.yml bumps, the merge SHA becomes the PROPAGATION SHA:
# Layer 4 (`_local-not-for-reuse-weekly-update.yml`) pins to it, and external
# repos pin their `uses: ...weekly-update.yml@<sha>` refs to it.
#
# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/weekly-update.lock.yml

name: 🔄 Weekly Update

# Reusable weekly-update workflow for socket-* repos.
#
# Each consumer repo's `.github/workflows/weekly-update.yml` is a thin caller
# that invokes this workflow, which in turn delegates to the gh-aw agentic
# implementation. The update logic lives in the consumer repo's `/updating`
# skill, which the gh-aw agent runs; the `/updating` skill is the umbrella —
# it reads repo state (`.config/lockstep.json`, `.gitmodules`) and delegates to
# `updating-lockstep` / `updating-upstream` / `updating-workflows` as applicable.

on:
  workflow_call:
    inputs:
      branch-prefix:
        description: 'Branch name prefix for the PR branch (date suffix added automatically)'
        required: false
        type: string
        default: 'weekly-update'
      check-timeout-minutes:
        description: 'Timeout for the check-updates job'
        required: false
        type: number
        default: 10
      checkout-fetch-depth:
        description: 'Fetch depth for checkout (0 = full history; recommended for submodule drift analysis)'
        required: false
        type: string
        default: '0'
      checkout-submodules:
        description: 'Submodule init mode: "false" (no submodules), "true" (top-level only), or "recursive"'
        required: false
        type: string
        default: 'false'
      fix-model:
        description: 'Claude model for the fix-test-failures step (escalation after haiku update)'
        required: false
        type: string
        default: 'sonnet'
      fix-timeout-minutes:
        description: 'Timeout for the fix-test-failures step'
        required: false
        type: number
        default: 15
      pr-base:
        description: 'Base branch for the PR'
        required: false
        type: string
        default: 'main'
      pr-body-extra:
        description: 'Optional markdown appended to the PR body (e.g., cross-linked PR references for cascade tracking)'
        required: false
        type: string
        default: ''
      pr-title-prefix:
        description: 'PR title prefix (date suffix added automatically: "... (YYYY-MM-DD)")'
        required: false
        type: string
        default: 'chore(deps): weekly dependency update'
      test-setup-script:
        description: 'Command to run before tests (e.g., "pnpm run build")'
        required: false
        type: string
        default: 'pnpm run build'
      test-script:
        description: 'Test command'
        required: false
        type: string
        default: 'pnpm test'
      test-timeout-minutes:
        description: 'Timeout for the test step'
        required: false
        type: number
        default: 15
      update-model:
        description: 'Claude model for the update step'
        required: false
        type: string
        default: 'haiku'
      update-timeout-minutes:
        description: 'Timeout for the update step'
        required: false
        type: number
        default: 10
      updating-skill:
        description: 'Skill to invoke for the update. Defaults to the /updating umbrella.'
        required: false
        type: string
        default: 'updating'
      validate-file-patterns:
        description: 'Shell case-glob patterns (pipe-separated) of file paths allowed to change during the update. Default covers npm + submodules + lockstep manifest; add source patterns for repos that auto-fix source.'
        required: false
        type: string
        default: 'package.json|*/package.json|pnpm-lock.yaml|*/pnpm-lock.yaml|.npmrc|pnpm-workspace.yaml|.gitmodules|.config/lockstep.json'
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude Code invocations'
        required: true
      BOT_GPG_PRIVATE_KEY:
        description: 'DEPRECATED — unused since this workflow delegates to the gh-aw implementation, which signs commits via the GitHub API (safe-outputs) rather than a local signed git push. Accepted one cycle so existing callers keep working; drop it next wave.'
        required: false
      SOCKET_API_TOKEN:
        description: 'Socket API token — sfw-enterprise instead of sfw-free when provided'
        required: false
      SOCKET_API_KEY:
        description: 'DEPRECATED alias of SOCKET_API_TOKEN. Pass `SOCKET_API_TOKEN:` instead. Tracked for one cycle so existing callers keep working.'
        required: false

permissions: {}

jobs:
  weekly-update:
    name: Weekly Update (gh-aw)
    # The gh-aw impl runs the agent, creates the PR via safe-outputs, and
    # dispatches fix-test-failures — hence the write union. The token cannot
    # exceed what the consumer's caller grants, so each consumer must grant
    # these scopes in its thin caller.
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.lock.yml@f686e4e3b7554d83a4597f1e60514ea70ce09ed8 # main (2026-07-10)
    with:
      branch-prefix: ${{ inputs.branch-prefix }}
      check-timeout-minutes: ${{ inputs.check-timeout-minutes }}
      checkout-fetch-depth: ${{ inputs.checkout-fetch-depth }}
      checkout-submodules: ${{ inputs.checkout-submodules }}
      fix-model: ${{ inputs.fix-model }}
      fix-timeout-minutes: ${{ inputs.fix-timeout-minutes }}
      pr-base: ${{ inputs.pr-base }}
      pr-body-extra: ${{ inputs.pr-body-extra }}
      pr-title-prefix: ${{ inputs.pr-title-prefix }}
      test-setup-script: ${{ inputs.test-setup-script }}
      test-script: ${{ inputs.test-script }}
      test-timeout-minutes: ${{ inputs.test-timeout-minutes }}
      update-model: ${{ inputs.update-model }}
      update-timeout-minutes: ${{ inputs.update-timeout-minutes }}
      updating-skill: ${{ inputs.updating-skill }}
      validate-file-patterns: ${{ inputs.validate-file-patterns }}
    # Explicit pass-through (not `inherit`) so only the secrets the gh-aw impl
    # needs cross the boundary. gh-aw's optional GH_AW_* tokens are unused today
    # (required: false in the .lock.yml; it falls back to GITHUB_TOKEN) — add
    # them here if a consumer ever provisions them.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
