  # ahead of the soak by owner directive (out of RC). The main package + its
  # 20-package per-platform binding family are pinned to the exact version
  # (a scope glob would blanket-bypass any future @typescript publish).
  # Socket-owned scopes — bypass the soak window because they ship
  # through Socket's own provenance + publish pipeline. Canonical
  # list: scripts/constants/socket-scopes.mts SOCKET_PACKAGE_PATTERNS.
  # Mirrored in `.config/taze.config.mts` (same scopes, same reason)
  # and consumed by scripts/repo/update-external-tools.mts via
  # isSocketSourcedPackage / isSocketSourcedRepository.
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketoverride/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - 'sfw'
  - 'socket'
  # @redwoodjs/agent-ci@0.16.2 is the local-CI tool we're adopting now
  # (see the `agent-ci` skill). Published 2026-05-22, ~6.5 days before this
  # entry — it clears the 7-day soak later the same day, so the exclude is
  # retirable on `removable`. Scoped to the exact tag so a future 0.16.3
  # still soaks. The Socket gptMalware (high) alert on this version is a
  # user-confirmed false positive (CI runner: docker exec, SSH-agent
  # forward, mock local token; no eval/obfuscation/secret exfil).
  # dtu-github-actions is agent-ci's GitHub-Actions parser, pulled in
  # transitively at the same version + publish date as the CLI above.
  # playwright-core@1.55.1 — headless Chromium driver for the
  # rendering-chromium-to-png skill. Well-known Microsoft package, dev-only
  # (renders PNGs an agent can read; no runtime/ship surface). Long past soak;
