packages:
  - packages/npm/*
  - perf/*
  - registry
  # Test fixture exercising overrides against upstream-original packages;
  # folded into the root workspace (no separate fixture lockfile).
  - test/npm
  - .claude/hooks/*
  - '.config/fleet/oxlint-plugin'
  - '.config/fleet/oxlint-plugin/fleet/*'

# Packages allowed to run build scripts (pnpm v11 strictDepBuilds default).
allowBuilds:
  # Optional native addon for ssh2; the pure-JS fallback is fine here.
  cpu-features: false
  # test/npm fixture transitive; postinstall only prints a message.
  es5-ext: true
  # Ships prebuilt dist; postinstall codegen not needed as a dependency.
  protobufjs: false
  # Postinstall fetches the per-platform native binding; required to run.
  rolldown: true
  # Native bindings are optional (cpu-features above); JS paths suffice.
  ssh2: false

pmOnFail: warn

