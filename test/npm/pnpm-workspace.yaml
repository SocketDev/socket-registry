packages:
  - packages/*

# Test fixture: overrides for transitive Dependabot advisories.
# These pin the patched versions without touching the fixture's
# direct devDependencies (which intentionally reflect the
# upstream-original npm packages we're testing overrides against).
overrides:
  # advisory #267 picomatch denial-of-service
  picomatch: 4.0.4
  # advisory #271 postcss / advisories #268/#269/#270 vite (all dev-only)
  postcss: 8.5.15
  vite: 7.3.2
  # GHSA-5xrq-8626-4rwp vitest UI arbitrary file read/exec (dev-only)
  vitest: 4.1.6
